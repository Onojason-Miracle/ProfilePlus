<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <link rel="stylesheet" href="form.css" />
    <title>ProfilePlus Form</title>
  </head>
  <body>
    <section id="form-wrapper">
      <div class="bg">
        <h1 class="text-light">User Data</h1>
      </div>

      <div class="form-div">
        <form class="form" id="userForm">
          <p class="form-group">
            <label class="form-label">First Name :</label>
            <input
              type="text"
              required
              placeholder="e.g Mercy"
              class="form-control"
              id="f-name"
            />
          </p>

        
          <p class="form-group">
            <label class="form-label">Last Name :</label>
            <input
              type="text"
              required
              placeholder="e.g Williams"
              class="form-control"
              id="l-name"
            />
          </p>

          <p class="form-group">
            <label class="form-label">Email :</label>
            <input
              type="email"
              placeholder="e.g chi@gmail.com"
              class="form-control"
              id="email"
            />
          </p>

          <p class="form-group">
            <label class="form-label">Phone Number :</label>
            <input
              type="number"
              placeholder="e.g 09123456789"
              class="form-control"
              id="number"
            />
          </p>

         

          <p class="form-group">
            <label class="form-label">Display Picture :</label>
            <input
              type="file"
              required
              class="form-control"
              id="dp"
            />
          </p>

          <p class="form-group">
            <label class="form-label">Gender:</label>
            <div>
              <input type="radio" id="male" name="gender" value="Male"  required />
              <label for="male">Male</label>
            </div>
            <div>
              <input type="radio" id="female" name="gender" value="Female" />
              <label for="female">Female</label>
            </div>
          </p>


          <p class="form-group">
            <label class="form-label">LinkedIn Profile :</label>
            <input
              type="url"
              placeholder="e.g https://linkedin.com/in/username"
              class="form-control"
              id="linkedin"
            />
          </p>
          
          <p class="form-group">
            <label class="form-label">Instagram Handle :</label>
            <input
              type="url"
              placeholder="e.g https://instagram.com/username"
              class="form-control"
              id="instagram"
            />
          </p>
          
          <p class="form-group">
            <label class="form-label">Twitter/X Handle :</label>
            <input
              type="url"
              placeholder="e.g https://x.com/username"
              class="form-control"
              id="twitter"
            />
          </p>
          
          <p class="form-group">
            <label class="form-label">Facebook Profile :</label>
            <input
              type="url"
              placeholder="e.g https://facebook.com/username"
              class="form-control"
              id="facebook"
            />
          </p>
          
          <p class="form-group">
            <label class="form-label">YouTube Channel :</label>
            <input
              type="url"
              placeholder="e.g https://youtube.com/c/username"
              class="form-control"
              id="youtube"
            />
          </p>
          
          <p class="form-group">
            <label class="form-label">Portfolio/Personal Website :</label>
            <input
              type="url"
              placeholder="e.g https://portfolio.com"
              class="form-control"
              id="website"
            />
          </p>

          <p class="form-group">
            <label class="form-label">Tiktok Handle :</label>
            <input
              type="url"
              placeholder="e.g https://tiktok.com/username"
              class="form-control"
              id="tiktok"
            />
          </p>
          
          <p class="form-group">
            <label class="form-label">Resume :</label>
            <input
              type="url"
              placeholder="link to your resume"
              class="form-control"
              id="resume"
            />
          </p>
          

          <p>
            <button class="btnForm">Submit</button>
          </p>
        </form>

        <!-- <div id="displayData"></div> -->
      </div>
    </section>

    <script src="form.js"></script>
  </body>
</html>
